<!DOCTYPE html>
<html>
<head>
    <title>Bird Hunter Extraordinaire</title>
    </head>
<body>
    <h2>Andrew Atkins bird hunt</h2>
    <p>Click on the locations to find the birds, watch out for the forbidden statue</p>
    <p id="locations">Number of locations checked is zero.</p>
    <p id="score">Score is zero.</p>
    <p onclick="help()">Click for help.</p>
    <p id="help">Help report</p>

    <div id="gameField" class="container">
    </div>

    <script>
        let gameField = document.getElementById("gameField");
        for (let row = 0; row < 5; row++) {
            let rowDiv = document.createElement("div");
            rowDiv.className = "row d-flex";
            for (let col = 0; col < 7; col++) {
                let img = document.createElement("img");
                img.src = "bush.jpg"; 
                img.width = 100;
                img.height = 100;
                rowDiv.appendChild(img);
            }
            gameField.appendChild(rowDiv);
        }

</script>    
</body>
</html>
