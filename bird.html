<<!DOCTYPE html>
<html>
<head>
    <title>Andrew Atkins bird hunt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .game-grid { display: grid; grid-template-columns: repeat(7, 1fr); width: 700px; margin: 0 auto; }
        img { border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div class="container text-center">
        <h2>Andrew Atkins bird hunt</h2>
        <p>Click on the locations to find the birds, watch out for the forbidden statue</p>
        <p id="locations">Number of locations checked is zero.</p>
        <p id="score">Score is zero.</p>
        <p onclick="help()" style="cursor:pointer; color: blue; text-decoration: underline;">Click for help.</p>
        <p id="help">Help report</p>

        <div id="grid" class="game-grid"></div>
    </div>

    <script>
        let ids = [];
        for (let i = 0; i < 35; i++) ids.push("img" + i);

        let score = 0;
        let locationsVisited = 0;
        let lastLocation = 0;
        let statueLocation = 19;
        let toucanLocation = 14;
        let lorikeetLocations = [3, 25];
        let buntingLocations = [2, 5, 11, 20, 21];
        let gameOver = false;

        const gridElement = document.getElementById("grid");
        for (let i = 0; i < 35; i++) {
            let img = document.createElement("img");
            img.id = ids[i];
            img.src = "bush.jpg";
            img.width = 100;
            img.height = 100;
            img.onclick = function() { check(i); };
            gridElement.appendChild(img);
        }

        function check(position) {
            if (gameOver) return;

            let imgElement = document.getElementById(ids[position]);
            
            if (position === statueLocation) {
                imgElement.src = "statue.jpg";
                gameOver = true;
                score -= 3;
            } else if (position === toucanLocation) {
                imgElement.src = "toucan.jpg";
                score += 5;
            } else if (lorikeetLocations.includes(position)) {
                imgElement.src = "lorikeet.jpg";
                score += 3;
            } else if (buntingLocations.includes(position)) {
                imgElement.src = "bunting.jpg";
                score += 1;
            } else {
                imgElement.src = "bush.jpg";
            }

            locationsVisited++;
            lastLocation = position;
            imgElement.onclick = null;

            document.getElementById("locations").innerHTML = "Number of locations checked is " + locationsVisited + ".";
            document.getElementById("score").innerHTML = "Score is " + score + ".";
        }

        function help() {
            let row = Math.floor(lastLocation / 7);
            let col = lastLocation % 7;

            let neighbors = [
                (lastLocation + 1) % 35,
                (lastLocation + 34) % 35,
                (lastLocation + 7) % 35,
                (lastLocation + 28) % 35
            ];

            for (let n of neighbors) {
                if (buntingLocations.includes(n)) {
                    document.getElementById("help").innerHTML = "cheep";
                    return;
                }
            }

            let lastRow = Math.floor(lastLocation / 7);
            let lastCol = lastLocation % 7;
            let toucanRow = Math.floor(toucanLocation / 7);
            let toucanCol = toucanLocation % 7;

            if (Math.abs(lastRow - toucanRow) <= 1 && Math.abs(lastCol - toucanCol) <= 1) {
                document.getElementById("help").innerHTML = "caw";
                return;
            }

            let statueRow = Math.floor(statueLocation / 7);
            let statueCol = statueLocation % 7;

            if (Math.abs(lastRow - statueRow) <= 1 && Math.abs(lastCol - statueCol) <= 1) {
                document.getElementById("help").innerHTML = "thrrum";
                return;
            }

            document.getElementById("help").innerHTML = "silence";
        }
    </script>
</body>
</html>
