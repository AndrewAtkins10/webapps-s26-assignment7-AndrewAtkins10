<!DOCTYPE html>
<html>
<head>
    <title>Andrew Atkins reflexes</title>
</head>
<body>
    <h2>Andrew Atkins reflexes</h2>
    <div id="target">Your time</div>
    <div id="counter">Count</div>
    <button onclick="beginTime()">Go</button>
    <button id="haltBtn">Halt</button>

    <script>
        let haltTime;
        document.getElementById("haltBtn").onclick = function() {
            haltTime = Date.now();
            console.log(haltTime);
        };

        function beginTime() {
            haltTime = undefined;
            let startValue = Math.floor(Math.random() * 9) + 2; 
            for (let i = 0; i <= startValue; i++) {
                setTimeout(function() {
                    document.getElementById("counter").innerHTML = i;
                }, (startValue - i) * 1000);
            }

            setTimeout(function() {
                if (haltTime === undefined) {
                    document.getElementById("target").innerHTML = "Not soon enough";
                } else {
                    document.getElementById("target").innerHTML = "Time was " + (Date.now() - haltTime);
                }
            }, startValue * 1000);
        }
    </script>
</body>
</html>
